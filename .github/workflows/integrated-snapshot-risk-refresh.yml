name: integrated-snapshot-risk-refresh

on:
  workflow_dispatch:
    inputs:
      snapshot_date:
        description: "YYYY-MM-DD. 비우면 오늘 날짜 사용"
        required: false
        default: ""
  schedule:
    - cron: "30 5 * * *"

jobs:
  refresh-integrated-snapshot-risk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Refresh integrated snapshot risk
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          INTEGRATED_RISK_SOURCE_KEY: integrated_snapshot_risk_daily
          INTEGRATED_RISK_SNAPSHOT_DATE: ${{ github.event.inputs.snapshot_date }}
          INTEGRATED_RISK_BATCH_SIZE: "500"
        run: npm run collect:integrated-risk